# ─── timekeep — Production Deployment ──────────────────────────
#
# Quick start:
#   1. Copy .env.example → .env and set secrets
#   2. docker compose up -d
#   3. Open http://localhost:3000 for the dashboard
#
# Services:
#   - app:        timekeep binary (API + dashboard + ADMS server)
#   - postgres:   Optional PostgreSQL backend (uncomment to use instead of SQLite)
#   - otel:       Optional OpenTelemetry collector (uncomment for tracing)

services:
  app:
    build: .
    container_name: timekeep
    restart: unless-stopped
    ports:
      - "3000:3000"    # Management API + Dashboard
      - "3001:3001"    # Integration API
      - "${TIMEKEEP_ADMS_PORT:-8085}:${TIMEKEEP_ADMS_PORT:-8085}"    # ADMS push endpoint
    environment:
      - TIMEKEEP_DB_PATH=/var/lib/timekeep/timekeep.db
      - TIMEKEEP_DB_BACKEND=sqlite
      - TIMEKEEP_API_PORT=3000
      - TIMEKEEP_INTEGRATION_PORT=3001
      - TIMEKEEP_ADMS_PORT=${TIMEKEEP_ADMS_PORT:-8085}
      - RUST_LOG=timekeep=info
      - TIMEKEEP_JWT_SECRET=${TIMEKEEP_JWT_SECRET:-change-me-in-production}
      - TIMEKEEP_ADMIN_USER=${TIMEKEEP_ADMIN_USER:-admin}
      - TIMEKEEP_ADMIN_PASSWORD=${TIMEKEEP_ADMIN_PASSWORD:-change-me}
      # Webhook and Odoo endpoints are configured through the dashboard
      # (Settings → Endpoints). No environment variables needed.
      # Optional OpenTelemetry:
      # - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel:4317
      # - OTEL_SERVICE_NAME=timekeep
    volumes:
      - timekeep-data:/var/lib/timekeep
    # For PostgreSQL or OTel, uncomment:
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    #   otel:
    #     condition: service_started

  # ─── Optional: PostgreSQL backend ──────────────────────────────────
  #
  # Uncomment to use PostgreSQL instead of SQLite.
  # Then set environment on the app service:
  #   TIMEKEEP_DB_BACKEND=postgres
  #   DATABASE_URL=postgres://timekeep:${POSTGRES_PASSWORD}@postgres:5432/timekeep
  #
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: timekeep-postgres
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_USER=timekeep
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
  #     - POSTGRES_DB=timekeep
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U timekeep"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ─── Optional: OpenTelemetry collector ─────────────────────────────
  #
  # Uncomment for distributed tracing + metrics export.
  # Point your tracing backend (Jaeger, Grafana, etc.) at this collector.
  #
  # otel:
  #   image: otel/opentelemetry-collector-contrib:latest
  #   container_name: timekeep-otel
  #   restart: unless-stopped
  #   command: ["--config=/etc/otel-collector-config.yaml"]
  #   volumes:
  #     - ./deploy/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro

volumes:
  timekeep-data:
  # postgres-data:
